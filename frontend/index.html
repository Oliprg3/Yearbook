<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Novus | 11G Yearbook • Class of 2026/27</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="novus.jpg">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8b5cf6',
                        secondary: '#d946ef',
                        accent: '#06b6d4',
                    },
                }
            }
        }
    </script>

    <!-- Firebase SDK (client-side only) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD95Qi5prvCXsxnX4sBupEc-P4UVOfwr-k",
            authDomain: "novus-yearbook.firebaseapp.com",
            projectId: "novus-yearbook",
            storageBucket: "novus-yearbook.firebasestorage.app",
            messagingSenderId: "737852354548",
            appId: "1:737852354548:web:ae3b0d85f0705969e653a1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAuth = auth;
        window.firebaseProvider = provider;
        window.firebaseSignInWithPopup = signInWithPopup;
        window.firebaseSignInWithRedirect = signInWithRedirect;
        window.firebaseGetRedirectResult = getRedirectResult;
        window.firebaseSignOut = signOut;
    </script>

    <style>
        /* ========== FULL CSS ========== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --surface-hover: rgba(241, 245, 249, 1);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-line: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.05);
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --accent: #06b6d4;
        }
        .dark {
            --bg: #0a0812;
            --surface: rgba(21, 18, 33, 0.85);
            --surface-solid: #151221;
            --surface-hover: rgba(28, 24, 43, 1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-line: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }
        .aurora-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }
        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: moveBlobs 20s infinite alternate;
        }
        .blob-1 { width: 600px; height: 600px; background: linear-gradient(135deg, #8b5cf6, #d946ef); top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); bottom: -150px; right: -100px; animation-delay: -5s; }
        .blob-3 { width: 400px; height: 400px; background: linear-gradient(135deg, #d946ef, #f472b6); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }
        @keyframes moveBlobs {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }
        .noise-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.03; z-index: -1; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-line);
            box-shadow: var(--glass-shadow);
        }
        .glass-strong {
            background: rgba(21, 18, 33, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6, #d946ef, #06b6d4, #8b5cf6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 8s ease infinite;
        }
        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 50;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(0);
        }
        .sidebar-expanded { width: 280px; }
        .sidebar-collapsed { width: 80px; }
        .sidebar-toggle-btn {
            position: absolute;
            right: -12px;
            top: 80px;
            width: 24px; height: 24px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
            transition: all 0.2s ease;
            z-index: 50;
        }
        .sidebar-toggle-btn:hover { transform: scale(1.1); }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
            width: 100%;
            background: transparent;
            cursor: pointer;
            position: relative;
        }
        .nav-link:hover { background: var(--surface-hover); color: var(--text-main); }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(217, 70, 239, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: var(--text-main);
        }
        .nav-link.active i { color: var(--primary); }
        .main-content {
            flex: 1;
            margin-left: 280px;
            transition: margin-left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-content.collapsed { margin-left: 80px; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .bento-item {
            background: var(--surface);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border-line);
            transition: all 0.3s ease;
        }
        .bento-item:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.2);
        }
        .bento-large { grid-column: span 2; grid-row: span 2; }
        .bento-wide { grid-column: span 2; }
        .bento-tall { grid-row: span 2; }
        @media (max-width: 1024px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
            .main-content { margin-left: 0 !important; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.mobile-open { transform: translateX(0); }
        }
        @media (max-width: 640px) {
            .bento-grid { grid-template-columns: 1fr; }
            .bento-large, .bento-wide { grid-column: span 1; }
        }
        .masonry { column-count: 1; column-gap: 1.5rem; }
        .masonry-item { break-inside: avoid; margin-bottom: 1.5rem; }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        .timeline-container { position: relative; padding-left: 2rem; }
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #8b5cf6, #d946ef, #06b6d4, transparent);
        }
        .timeline-dot {
            position: absolute;
            left: -5px;
            width: 14px; height: 14px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 50%;
            top: 24px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        .animate-pulse-glow { animation: pulseGlow 4s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #8b5cf6, #d946ef);
            border-radius: 4px;
        }
        .kinetic-title {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }
        .interactive-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -15px rgba(139, 92, 246, 0.3);
        }
        .glow-btn { position: relative; overflow: hidden; }
        .glow-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .glow-btn:hover::before { left: 100%; }
        .mobile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 40;
            display: none;
        }
        .mobile-overlay.active { display: block; }
        .view-section { display: none; animation: fadeInUp 0.4s ease-out; }
        .view-section.active { display: block; }
        .profile-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        .profile-modal.active { display: flex; }
        .profile-card {
            max-width: 550px;
            width: 90%;
            background: var(--surface-solid);
            border-radius: 2rem;
            border: 1px solid var(--border-line);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .file-upload-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
        }
        .file-upload-btn:hover { background: #7c3aed; transform: translateY(-1px); }
        .file-name { font-size: 0.75rem; color: var(--text-muted); margin-left: 0.5rem; }
        .brand-logo {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
        .login-logo {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 18px 35px rgba(0,0,0,0.35);
        }
        .danger-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.45rem 0.8rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .danger-btn:hover { background: #dc2626; }
        .image-zoom-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .image-zoom-modal.active {
            display: flex;
        }
        .image-zoom-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .memory-img-container {
            cursor: pointer;
        }
        .student-profile-img {
            cursor: pointer;
        }
        .students-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        @media (min-width: 640px) {
            .students-grid { gap: 1.5rem; }
        }
        @media (min-width: 768px) {
            .students-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 1024px) {
            .students-grid { grid-template-columns: repeat(4, 1fr); }
        }
        .student-card {
            background: var(--surface-solid);
            border-radius: 1.5rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border-line);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .student-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.2);
        }
        @media (max-width: 480px) {
            .student-card { padding: 1rem; }
            .student-card .w-32 { width: 5rem; height: 5rem; }
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 2rem;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        .dark .google-btn {
            background: #2d2d3a;
            color: #eee;
            border-color: #444;
        }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: var(--surface-solid);
            border: 1px solid var(--border-line);
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            min-width: 200px;
            z-index: 50;
            overflow: hidden;
        }
        .dropdown-menu a, .dropdown-menu button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: var(--text-main);
            transition: background-color 0.2s;
        }
        .dropdown-menu a:hover, .dropdown-menu button:hover {
            background-color: var(--surface-hover);
        }
        .dropdown-divider {
            height: 1px;
            background-color: var(--border-line);
            margin: 0.25rem 0;
        }
        .user-info {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-line);
        }
        .user-name {
            font-weight: 600;
            font-size: 0.875rem;
        }
        .user-email {
            font-size: 0.75rem;
            color: var(--text-muted);
            word-break: break-all;
        }
        .admin-panel-scroll {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        @media (max-width: 768px) {
            .admin-panel-scroll {
                max-height: calc(100vh - 150px);
            }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div class="aurora-bg"><div class="aurora-blob blob-1"></div><div class="aurora-blob blob-2"></div><div class="aurora-blob blob-3"></div></div>
    <div class="noise-overlay"></div>
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <aside class="sidebar sidebar-expanded glass border-r border-[var(--border-line)] flex flex-col" id="sidebar">
        <button class="sidebar-toggle-btn hidden md:flex" onclick="toggleSidebar()"><i class="fas fa-chevron-left text-xs" id="toggleIcon"></i></button>
        <div class="flex items-center justify-between px-6 py-6">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showView('home')">
                <img src="novus.jpg" alt="Novus logo" class="brand-logo">
                <span class="font-bold text-lg tracking-wide text-[var(--text-main)] sidebar-text">Novus</span>
            </div>
            <button onclick="closeMobileSidebar()" class="md:hidden text-[var(--text-muted)]"><i class="fas fa-times text-lg"></i></button>
        </div>
        <nav class="flex-1 px-3 space-y-1 overflow-y-auto">
            <button class="nav-link active" data-view="home" onclick="showView('home')"><div class="active-indicator absolute left-0 top-1/2 -translate-y-1/2 w-1 h-6 bg-[var(--primary)] rounded-r-full"></div><i class="fas fa-home text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Home</span></button>
            <button class="nav-link" data-view="students" onclick="showView('students')"><i class="fas fa-user-friends text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Students</span></button>
            <button class="nav-link" data-view="memories" onclick="showView('memories')"><i class="fas fa-images text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Memories</span></button>
            <button class="nav-link" data-view="quotes" onclick="showView('quotes')"><i class="fas fa-quote-right text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Student Stories</span></button>
            <button id="adminNavBtn" class="nav-link hidden" data-view="admin" onclick="showView('admin')"><i class="fas fa-crown text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Admin Panel</span></button>
        </nav>
        <div class="px-4 pb-6 countdown-widget">
            <div class="glass-strong rounded-2xl p-4 text-center">
                <p class="text-xs text-[var(--text-muted)] mb-1">11G • Class of 2026/27</p>
                <div class="mt-2 text-xs text-[var(--text-muted)]">📘 Junior Yearbook</div>
            </div>
        </div>
        <div class="px-4 pb-6 countdown-icon hidden justify-center">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[var(--primary)] to-[var(--secondary)] flex items-center justify-center text-white"><i class="fas fa-school"></i></div>
        </div>
    </aside>

    <div class="main-content flex flex-col h-full" id="mainContent">
        <header class="flex items-center justify-between px-6 py-4 glass border-b border-[var(--border-line)] sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <button onclick="openMobileSidebar()" class="md:hidden text-[var(--text-muted)] w-10 h-10 flex items-center justify-center rounded-xl hover:bg-[var(--surface-hover)]"><i class="fas fa-bars text-lg"></i></button>
                <div class="hidden md:flex items-center gap-3">
                    <span class="font-semibold text-[var(--text-main)] tracking-wide text-sm">Novus • 11G Yearbook • Class of 2026/27</span>
                    <span class="px-2 py-1 rounded-full bg-[var(--primary)]/10 text-[var(--primary)] text-xs font-bold border border-[var(--primary)]/20">11G</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center text-[var(--text-muted)] rounded-xl hover:bg-[var(--surface-hover)]"><i class="fas fa-moon text-lg" id="themeIcon"></i></button>
                <div class="h-8 w-px bg-[var(--border-line)] hidden sm:block"></div>
                <div class="relative" id="avatarContainer">
                    <img id="headerAvatar" src="https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff" class="w-9 h-9 rounded-full border-2 border-transparent hover:border-[var(--primary)] transition-all shadow-lg cursor-pointer">
                    <div id="avatarDropdown" class="dropdown-menu hidden"></div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto overflow-x-hidden scroll-smooth" id="contentArea">
            <div id="view-home" class="view-section active"></div>
            <div id="view-students" class="view-section"></div>
            <div id="view-memories" class="view-section"></div>
            <div id="view-events" class="view-section"></div>
            <div id="view-quotes" class="view-section"></div>
            <div id="view-admin" class="view-section"></div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm" onclick="closeLogin()">
        <div class="glass-strong p-8 md:p-10 rounded-3xl w-[90%] max-w-md text-center" onclick="event.stopPropagation()">
            <img src="novus.jpg" alt="Novus logo" class="login-logo mx-auto mb-4">
            <h2 class="text-3xl font-bold text-[var(--text-main)] mb-2">Welcome to Novus</h2>
            <p class="text-[var(--text-muted)] mb-6">Sign in with your Google account to explore the yearbook</p>
            <button id="googleSignInBtn" class="google-btn w-full flex items-center justify-center gap-3">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" /><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" /><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" /><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" /></svg>
                Continue with Google
            </button>
            <div id="loginStatusMsg" class="text-center text-sm mt-4 text-yellow-300"></div>
        </div>
    </div>

    <div id="imageZoomModal" class="image-zoom-modal" onclick="closeImageZoom()">
        <img id="zoomImage" src="" alt="Zoomed image">
    </div>

    <script>
        const API_BASE = 'https://yearbook2.onrender.com/api';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let allStudents = [];
        let allMemories = [];

        function escapeHtml(str = '') {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        async function authFetch(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...(token && { 'x-auth-token': token }), ...options.headers };
            const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (!res.ok) { const err = await res.text(); throw new Error(err); }
            return res.json();
        }

        function getCurrentUserEmail() { return currentUser?.email || window.firebaseAuth?.currentUser?.email || null; }
        function isAdmin() { const email = getCurrentUserEmail(); return email && email.toLowerCase() === 'adminof11g@gmail.com'; }

        // ==================== FIXED PHOTO UPLOAD (Base64 JSON) ====================
        async function updateStudentPhoto(id) {
            if (!isAdmin()) return alert('Only admin can change photos');
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) { alert('Please select an image file.'); return; }
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const base64Image = ev.target.result; // includes data:image/...;base64,
                    try {
                        const response = await fetch(`${API_BASE}/profile/update/${id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
                            body: JSON.stringify({ profileImage: base64Image })
                        });
                        if (!response.ok) {
                            const errorText = await response.text();
                            throw new Error(errorText || 'Upload failed');
                        }
                        alert('Photo updated successfully!');
                        await loadAllData(); // refresh everything
                    } catch (err) {
                        console.error('Photo update error:', err);
                        alert('Failed to update photo: ' + err.message + '\n\nTry again or contact admin.');
                    }
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // ==================== REST OF FUNCTIONS (unchanged but integrated) ====================
        async function loadAllData() {
            if (!token) return;
            try {
                const userData = await authFetch('/auth/me');
                currentUser = userData;
                const admin = isAdmin();
                document.getElementById('adminNavBtn').classList.toggle('hidden', !admin);
                const allUsers = await authFetch('/profile/all');
                allStudents = allUsers.filter(u => u.isStudent === true).map(u => ({ ...u, id: u._id }));
                allMemories = await authFetch('/posts');
                allMemories = allMemories.map(p => ({ ...p, id: p._id }));
                renderAllViews();
                updateAvatarDropdown();
            } catch (err) { console.error(err); alert('Failed to load data: ' + err.message); }
        }

        async function handleGoogleSignIn() {
            const auth = window.firebaseAuth, provider = window.firebaseProvider;
            const statusMsg = document.getElementById('loginStatusMsg');
            statusMsg.innerText = 'Signing in...';
            try {
                const result = await window.firebaseSignInWithPopup(auth, provider);
                await completeGoogleSignIn(result.user);
            } catch (err) {
                if (err.code === 'auth/popup-blocked') await window.firebaseSignInWithRedirect(auth, provider);
                else statusMsg.innerText = 'Error: ' + err.message;
            }
        }

        async function completeGoogleSignIn(user) {
            const idToken = await user.getIdToken();
            const res = await fetch(`${API_BASE}/auth/google`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ idToken }) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error);
            token = data.token; localStorage.setItem('token', token);
            await loadAllData(); closeLogin(); showView('home');
        }

        async function handleSignOut() { localStorage.removeItem('token'); token = null; currentUser = null; allStudents = []; allMemories = []; if(window.firebaseAuth) await window.firebaseSignOut(window.firebaseAuth); updateAvatarDropdown(); renderAllViews(); openLogin(); }

        function updateAvatarDropdown() {
            const dropdown = document.getElementById('avatarDropdown'), avatarImg = document.getElementById('headerAvatar');
            const email = getCurrentUserEmail();
            if (!email) { avatarImg.src = 'https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff'; dropdown.innerHTML = `<div class="user-info"><div class="user-name">Not signed in</div></div><div class="dropdown-divider"></div><button onclick="openLogin()">Sign In</button>`; return; }
            const displayName = currentUser?.name || email.split('@')[0];
            const photoUrl = currentUser?.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=8b5cf6&color=fff`;
            avatarImg.src = photoUrl;
            dropdown.innerHTML = `<div class="user-info"><div class="user-name">${escapeHtml(displayName)}</div><div class="user-email">${escapeHtml(email)}</div></div><div class="dropdown-divider"></div><button onclick="handleSignOut()" class="text-red-500">Sign Out</button>`;
        }

        async function addStudentFromForm() {
            if (!isAdmin()) return alert('Admin only');
            const name = document.getElementById('newName')?.value.trim();
            const email = document.getElementById('newEmail')?.value.trim() || `student-${Date.now()}@novus.local`;
            const quote = document.getElementById('newQuote')?.value.trim() || '';
            const lifeGoal = document.getElementById('newLifeGoal')?.value.trim() || '';
            const interests = document.getElementById('newInterests')?.value.trim() || '';
            const photoFile = document.getElementById('newPhoto')?.files[0];
            if (!name) return alert('Name required');
            const formData = new FormData();
            formData.append('name', name); formData.append('email', email); formData.append('password', 'student123');
            formData.append('quote', quote); formData.append('dream', lifeGoal); formData.append('hobby', interests);
            if (photoFile) formData.append('profileImage', photoFile);
            try {
                const res = await fetch(`${API_BASE}/auth/register`, { method: 'POST', headers: { 'x-auth-token': token }, body: formData });
                if (!res.ok) throw new Error((await res.json()).error || 'Failed');
                alert('Student added'); await loadAllData();
                ['newName','newEmail','newQuote','newLifeGoal','newInterests','newPhoto'].forEach(id => { const el = document.getElementById(id); if(el && id!=='newPhoto') el.value = ''; });
                if(document.getElementById('file-name')) document.getElementById('file-name').innerText = 'No file chosen';
            } catch (err) { alert('Error: ' + err.message); }
        }

        async function editStudent(id) {
            if (!isAdmin()) return;
            const s = allStudents.find(s => s.id === id);
            if(!s) return;
            const newName = prompt('New name', s.name);
            if(!newName) return;
            const newQuote = prompt('Quote', s.quote || '');
            const newLifeGoal = prompt('Life Goal', s.dream || '');
            const newInterests = prompt('Interests', s.hobby || '');
            try {
                await authFetch(`/profile/update/${id}`, { method: 'PUT', body: JSON.stringify({ name: newName, quote: newQuote, dream: newLifeGoal, hobby: newInterests }) });
                await loadAllData();
            } catch (err) { alert('Update failed: ' + err.message); }
        }

        async function deleteStudent(id) {
            if (!isAdmin() || !confirm('Delete this student?')) return;
            try { await authFetch(`/profile/deactivate/${id}`, { method: 'DELETE' }); await loadAllData(); } 
            catch (err) { alert('Delete failed: ' + err.message); }
        }

        async function createPostFromForm() {
            if (!isAdmin()) return alert('Admin only');
            const title = document.getElementById('postTitle')?.value.trim();
            const content = document.getElementById('postContent')?.value.trim();
            const imageFile = document.getElementById('postImage')?.files[0];
            if (!title) return alert('Title required');
            const formData = new FormData();
            formData.append('content', `${title}\n${content}`);
            if (imageFile) formData.append('image', imageFile);
            try {
                const res = await fetch(`${API_BASE}/posts/create`, { method: 'POST', headers: { 'x-auth-token': token }, body: formData });
                if (!res.ok) throw new Error((await res.json()).error);
                alert('Memory added!'); await loadAllData(); showView('memories');
                document.getElementById('postTitle').value = ''; document.getElementById('postContent').value = ''; document.getElementById('postImage').value = '';
                if(document.getElementById('post-file-name')) document.getElementById('post-file-name').innerText = 'No file chosen';
            } catch (err) { alert('Error: ' + err.message); }
        }

        async function deleteMemory(id) {
            if (!isAdmin() || !confirm('Delete memory?')) return;
            try { await authFetch(`/posts/${id}`, { method: 'DELETE' }); await loadAllData(); showView('memories'); } 
            catch (err) { alert('Delete failed: ' + err.message); }
        }

        // ==================== RENDER FUNCTIONS (abridged but complete) ====================
        function renderHome() { /* identical to original logic, but safe */ 
            const studentCount = allStudents.length, postCount = allMemories.length, daysLeft = Math.ceil((new Date('2027-06-15') - new Date())/(86400000));
            document.getElementById('view-home').innerHTML = `<section class="relative min-h-[90vh] flex items-center justify-center px-4"><div class="text-center max-w-4xl"><div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass border border-[var(--primary)]/20 text-[var(--primary)] text-sm font-bold mb-6">✨ 11G • Class of 2026/27</div><h1 class="kinetic-title gradient-text mb-6">Novus</h1><p class="text-[var(--text-muted)] text-lg max-w-2xl mx-auto mb-8">Celebrating our journey.</p>${!currentUser ? `<div class="glass p-6 max-w-md mx-auto"><button onclick="openLogin()" class="px-6 py-2 rounded-full bg-gradient-to-r from-[var(--primary)] to-[var(--secondary)] text-white">Sign In</button></div>` : `<div class="flex gap-4 justify-center"><button onclick="showView('students')" class="px-6 py-3 rounded-2xl bg-gradient-to-r from-[var(--primary)] to-[var(--secondary)] text-white font-bold">Meet the Class</button><button onclick="showView('memories')" class="px-6 py-3 rounded-2xl glass font-bold">Memories</button></div>`}</div></section>${currentUser ? `<section class="max-w-7xl mx-auto px-6 py-16"><div class="bento-grid" id="statsBento"></div></section><section class="max-w-7xl mx-auto px-6 py-16"><h2 class="text-2xl font-bold mb-6">Recent Moments</h2><div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="recentMemoriesHome"></div></section>` : ''}`;
            if(currentUser){
                document.getElementById('statsBento').innerHTML = `<div class="bento-item bento-large"><h3 class="font-bold text-xl">Class Stats</h3><div class="grid grid-cols-2 gap-4 mt-4"><div class="text-center p-3 rounded-xl bg-[var(--surface-hover)]"><div class="text-3xl font-bold gradient-text">${studentCount}</div><div>Students</div></div><div class="text-center p-3 rounded-xl bg-[var(--surface-hover)]"><div class="text-3xl font-bold gradient-text">${postCount}</div><div>Memories</div></div></div></div><div class="bento-item bento-tall cursor-pointer" onclick="showView('memories')" style="background-image:url('https://images.unsplash.com/photo-1523580494112-071d45815615?w=600'); background-size:cover;"><div class="h-full bg-black/50 flex items-end p-4 rounded-2xl"><p class="text-white font-bold">Latest Memory</p></div></div><div class="bento-item"><p class="text-sm">Graduation countdown: ${daysLeft} days</p></div>`;
                const recent = allMemories.slice(0,3);
                document.getElementById('recentMemoriesHome').innerHTML = recent.map(p => `<div class="glass rounded-2xl overflow-hidden"><img src="${p.image || 'https://images.unsplash.com/photo-1523580494112-071d45815615?w=600'}" class="h-40 w-full object-cover"><div class="p-3">${escapeHtml(p.content?.split('\n')[0] || 'Memory')}</div></div>`).join('') || '<div class="col-span-full text-center">No memories yet</div>';
            }
        }

        function renderStudents() {
            if(!currentUser){ document.getElementById('view-students').innerHTML = `<div class="text-center py-20">Sign in to view students</div>`; return; }
            document.getElementById('view-students').innerHTML = `<div class="max-w-7xl mx-auto px-4 py-10"><div class="flex justify-between items-center flex-wrap gap-4 mb-8"><h1 class="text-4xl font-bold gradient-text">Our Classmates</h1><input type="text" id="studentSearch" placeholder="Search..." oninput="filterStudents(this.value)" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-full px-5 py-2 w-64"></div><div class="students-grid" id="studentGrid"></div></div>`;
            renderStudentGrid();
        }
        function renderStudentGrid(filter=''){ const container = document.getElementById('studentGrid'); if(!container) return; const filtered = allStudents.filter(s=>s.name.toLowerCase().includes(filter.toLowerCase())); container.innerHTML = filtered.map(s=>`<div class="student-card" onclick="openStudentModal('${s.id}')"><img src="${s.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=8b5cf6&color=fff&size=128`}" class="w-32 h-32 rounded-full object-cover border-4 border-[var(--primary)] shadow-lg"><h3 class="font-bold text-xl mt-4">${escapeHtml(s.name)}</h3><p class="text-[var(--text-muted)] italic text-sm">"${escapeHtml(s.quote || '')}"</p></div>`).join(''); }
        window.filterStudents = (q)=>renderStudentGrid(q);

        function openStudentModal(id){
            const s = allStudents.find(st=>st.id===id);
            if(!s) return;
            const imgUrl = s.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(s.name)}&background=8b5cf6&color=fff&size=128`;
            const modalDiv = document.createElement('div'); modalDiv.id='studentModal'; modalDiv.className='profile-modal active'; modalDiv.onclick=()=>modalDiv.remove();
            modalDiv.innerHTML = `<div class="profile-card" onclick="event.stopPropagation()"><div class="p-6 text-center"><button class="float-right text-xl" onclick="document.getElementById('studentModal').remove()">&times;</button><img src="${imgUrl}" class="w-40 h-40 rounded-full object-cover border-4 border-[var(--primary)] mx-auto mb-4"><h2 class="text-2xl font-bold">${escapeHtml(s.name)}</h2><div class="glass rounded-xl p-4 mt-4 italic">"${escapeHtml(s.quote || 'No quote')}"</div><div class="mt-4 text-left"><p><strong>🌟 Life Goal:</strong> ${escapeHtml(s.dream || '—')}</p><p><strong>❤️ Interests:</strong> ${escapeHtml(s.hobby || '—')}</p></div></div></div>`;
            document.body.appendChild(modalDiv);
        }
        window.closeStudentModal = ()=>document.getElementById('studentModal')?.remove();

        function renderMemories(){
            if(!currentUser){ document.getElementById('view-memories').innerHTML = `<div class="text-center py-20">Sign in to view memories</div>`; return; }
            document.getElementById('view-memories').innerHTML = `<div class="max-w-7xl mx-auto px-4 py-10"><div class="flex justify-between items-center mb-8"><h1 class="text-4xl font-bold gradient-text">Memories</h1>${isAdmin() ? '<button onclick="showView(\'admin\')" class="bg-primary text-white px-5 py-2 rounded-xl">+ Add</button>' : ''}</div><div class="masonry" id="memoryGrid"></div></div>`;
            const grid = document.getElementById('memoryGrid');
            grid.innerHTML = allMemories.map(p => `<div class="masonry-item glass rounded-2xl overflow-hidden"><div class="memory-img-container cursor-pointer" onclick="openImageZoom('${p.image || 'https://images.unsplash.com/photo-1523580494112-071d45815615?w=800'}')"><img src="${p.image || 'https://images.unsplash.com/photo-1523580494112-071d45815615?w=800'}" class="w-full"><div class="p-4"><h3 class="font-bold">${escapeHtml(p.content?.split('\n')[0])}</h3><p class="text-sm text-[var(--text-muted)]">${escapeHtml(p.content?.split('\n').slice(1).join(' '))}</p><div class="flex justify-between mt-3 text-xs">${new Date(p.createdAt).toLocaleDateString()}${isAdmin() ? `<button onclick="deleteMemory('${p.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>` : ''}</div></div></div></div>`).join('');
        }

        function renderEvents(){
            if(!currentUser){ document.getElementById('view-events').innerHTML = `<div class="text-center py-20">Sign in to view timeline</div>`; return; }
            document.getElementById('view-events').innerHTML = `<div class="max-w-4xl mx-auto px-4 py-10"><h1 class="text-4xl font-bold gradient-text mb-8">Events Timeline</h1><div class="timeline-container" id="eventGrid"></div></div>`;
            const grid = document.getElementById('eventGrid');
            grid.innerHTML = allMemories.map(p => `<div class="relative mb-8"><div class="timeline-dot"></div><div class="glass rounded-2xl p-5 w-full md:w-4/5 ml-auto"><div class="text-xs text-primary mb-2">${new Date(p.createdAt).toLocaleDateString()}</div><h3 class="font-bold text-xl">${escapeHtml(p.content?.split('\n')[0])}</h3><p>${escapeHtml(p.content?.split('\n').slice(1).join(' '))}</p>${isAdmin() ? `<button onclick="deleteMemory('${p.id}')" class="danger-btn mt-3">Delete</button>` : ''}</div></div>`).join('');
        }

        function renderStories(){
            if(!currentUser){ document.getElementById('view-quotes').innerHTML = `<div class="text-center py-20">Sign in to read stories</div>`; return; }
            document.getElementById('view-quotes').innerHTML = `<div class="max-w-7xl mx-auto px-4 py-10"><h1 class="text-4xl font-bold gradient-text mb-8 text-center">Student Stories</h1><div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="storiesGrid"></div></div>`;
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = allStudents.map(s => `<div class="glass rounded-2xl p-6 cursor-pointer interactive-card" onclick="openStudentModal('${s.id}')"><i class="fas fa-quote-left text-3xl text-primary/30 mb-3"></i><p class="italic">"${escapeHtml(s.quote || 'Dream big')}"</p><div class="mt-4 font-bold">— ${escapeHtml(s.name)}</div></div>`).join('');
        }

        function renderAdminPanel(){
            if(!isAdmin()){ document.getElementById('view-admin').innerHTML = `<div class="text-center py-20">Admin access only</div>`; return; }
            const studentListHtml = allStudents.map(s => `<div class="flex justify-between items-center p-3 border-b flex-wrap gap-2"><span>${escapeHtml(s.name)}</span><div><button onclick="editStudent('${s.id}')" class="text-blue-400 mr-2"><i class="fas fa-edit"></i></button><button onclick="updateStudentPhoto('${s.id}')" class="text-green-400 mr-2"><i class="fas fa-camera"></i></button><button onclick="deleteStudent('${s.id}')" class="text-red-400"><i class="fas fa-trash"></i></button></div></div>`).join('');
            document.getElementById('view-admin').innerHTML = `<div class="max-w-7xl mx-auto px-4 py-10"><h1 class="text-4xl font-bold gradient-text mb-6">Admin Panel</h1><div class="glass rounded-2xl p-6 mb-8"><h3 class="font-bold text-xl mb-4">➕ Add Student</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><input id="newName" placeholder="Full name" class="bg-[var(--surface)] border rounded-lg px-4 py-2"><input id="newEmail" placeholder="Email (optional)" class="bg-[var(--surface)] border rounded-lg px-4 py-2"><textarea id="newQuote" placeholder="Quote" rows="2" class="bg-[var(--surface)] border rounded-lg px-4 py-2"></textarea><input id="newLifeGoal" placeholder="Life goal" class="bg-[var(--surface)] border rounded-lg px-4 py-2"><input id="newInterests" placeholder="Interests" class="bg-[var(--surface)] border rounded-lg px-4 py-2"><div><input type="file" id="newPhoto" accept="image/*" class="hidden"><button onclick="document.getElementById('newPhoto').click()" class="file-upload-btn">Upload Photo</button><span id="file-name" class="file-name">No file</span></div></div><button onclick="addStudentFromForm()" class="mt-4 px-6 py-2 bg-primary text-white rounded-xl">Create Student</button></div><div class="glass rounded-2xl p-6 mb-8"><h3 class="font-bold text-xl mb-4">📸 Create Memory</h3><input id="postTitle" placeholder="Title" class="w-full bg-[var(--surface)] border rounded-lg px-4 py-2 mb-3"><textarea id="postContent" placeholder="Description" rows="3" class="w-full bg-[var(--surface)] border rounded-lg px-4 py-2 mb-3"></textarea><input type="file" id="postImage" accept="image/*" class="hidden"><button onclick="document.getElementById('postImage').click()" class="file-upload-btn mr-2">Add Image</button><span id="post-file-name" class="file-name">No file</span><button onclick="createPostFromForm()" class="mt-3 px-6 py-2 bg-primary text-white rounded-xl">Post Memory</button></div><div class="glass rounded-2xl p-6"><h3 class="font-bold text-xl mb-4">📋 Manage Students</h3><div id="adminStudentList" class="max-h-96 overflow-y-auto">${studentListHtml}</div></div></div>`;
            document.getElementById('newPhoto')?.addEventListener('change', (e) => { document.getElementById('file-name').innerText = e.target.files[0]?.name || 'No file'; });
            document.getElementById('postImage')?.addEventListener('change', (e) => { document.getElementById('post-file-name').innerText = e.target.files[0]?.name || 'No file'; });
        }

        function renderAllViews(){ renderHome(); renderStudents(); renderMemories(); renderEvents(); renderStories(); renderAdminPanel(); }

        function toggleSidebar() { 
            const collapsed = localStorage.getItem('sidebar-collapsed') === 'true';
            const sidebar = document.getElementById('sidebar'), main = document.getElementById('mainContent'), icon = document.getElementById('toggleIcon');
            if (!collapsed) { sidebar.classList.replace('sidebar-expanded','sidebar-collapsed'); main.classList.add('collapsed'); icon.className='fas fa-chevron-right text-xs'; document.querySelectorAll('.sidebar-text').forEach(el=>el.style.display='none'); document.querySelector('.countdown-widget').style.display='none'; document.querySelector('.countdown-icon')?.classList.remove('hidden'); localStorage.setItem('sidebar-collapsed','true'); }
            else { sidebar.classList.replace('sidebar-collapsed','sidebar-expanded'); main.classList.remove('collapsed'); icon.className='fas fa-chevron-left text-xs'; document.querySelectorAll('.sidebar-text').forEach(el=>el.style.display='block'); document.querySelector('.countdown-widget').style.display='block'; document.querySelector('.countdown-icon')?.classList.add('hidden'); localStorage.setItem('sidebar-collapsed','false'); }
        }
        function openMobileSidebar(){ document.getElementById('sidebar').classList.add('mobile-open'); document.getElementById('mobileOverlay').classList.add('active'); }
        function closeMobileSidebar(){ document.getElementById('sidebar').classList.remove('mobile-open'); document.getElementById('mobileOverlay').classList.remove('active'); }
        function toggleTheme(){ document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); document.getElementById('themeIcon').className = document.documentElement.classList.contains('dark') ? 'fas fa-sun text-lg' : 'fas fa-moon text-lg'; }
        function showView(v){ document.querySelectorAll('.view-section').forEach(el=>el.classList.remove('active')); document.getElementById(`view-${v}`).classList.add('active'); document.querySelectorAll('.nav-link').forEach(link=>link.classList.remove('active')); document.querySelector(`.nav-link[data-view="${v}"]`)?.classList.add('active'); closeMobileSidebar(); }
        function openLogin(){ document.getElementById('loginModal').style.display = 'flex'; }
        function closeLogin(){ document.getElementById('loginModal').style.display = 'none'; }
        function openImageZoom(url){ const modal = document.getElementById('imageZoomModal'); document.getElementById('zoomImage').src=url; modal.classList.add('active'); }
        function closeImageZoom(){ document.getElementById('imageZoomModal').classList.remove('active'); }

        document.getElementById('avatarContainer')?.addEventListener('click',(e)=>{ e.stopPropagation(); document.getElementById('avatarDropdown').classList.toggle('hidden'); });
        document.addEventListener('click',()=>{ document.getElementById('avatarDropdown')?.classList.add('hidden'); });
        document.getElementById('googleSignInBtn')?.addEventListener('click', handleGoogleSignIn);
        window.updateStudentPhoto = updateStudentPhoto; window.editStudent = editStudent; window.deleteStudent = deleteStudent; window.deleteMemory = deleteMemory; window.addStudentFromForm = addStudentFromForm; window.createPostFromForm = createPostFromForm; window.openLogin = openLogin; window.showView = showView; window.toggleSidebar = toggleSidebar; window.openImageZoom = openImageZoom; window.closeImageZoom = closeImageZoom; window.handleSignOut = handleSignOut;

        (async ()=>{
            if(localStorage.getItem('theme')==='light') document.documentElement.classList.remove('dark');
            const savedCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
            if(savedCollapsed) setTimeout(()=>toggleSidebar(),100);
            await window.firebaseGetRedirectResult(window.firebaseAuth).then(async (result)=>{ if(result?.user) await completeGoogleSignIn(result.user); });
            token = localStorage.getItem('token');
            if(token) { try { await loadAllData(); closeLogin(); showView('home'); } catch(e){ localStorage.removeItem('token'); token=null; openLogin(); } } 
            else openLogin();
        })();
    </script>
</body>
</html>
