<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Novus | 11G Yearbook • Class of 2026/27</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="novus.jpg">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8b5cf6',
                        secondary: '#d946ef',
                        accent: '#06b6d4',
                    },
                }
            }
        }
    </script>

    <!-- Firebase SDK (client-side only) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD95Qi5prvCXsxnX4sBupEc-P4UVOfwr-k",
            authDomain: "novus-yearbook.firebaseapp.com",
            projectId: "novus-yearbook",
            storageBucket: "novus-yearbook.firebasestorage.app",
            messagingSenderId: "737852354548",
            appId: "1:737852354548:web:ae3b0d85f0705969e653a1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.firebaseAuth = auth;
        window.firebaseDb = db;
        window.firebaseProvider = provider;
        window.firebaseSignInWithRedirect = signInWithRedirect;
        window.firebaseGetRedirectResult = getRedirectResult;
        window.firebaseSignOut = signOut;
        window.firebaseOnAuthStateChanged = onAuthStateChanged;
        window.firebaseGetDoc = getDoc;
        window.firebaseDoc = doc;
    </script>

    <style>
        /* ========== FULL CSS ========== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --surface-hover: rgba(241, 245, 249, 1);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-line: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.05);
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --accent: #06b6d4;
        }
        .dark {
            --bg: #0a0812;
            --surface: rgba(21, 18, 33, 0.85);
            --surface-solid: #151221;
            --surface-hover: rgba(28, 24, 43, 1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-line: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }
        .aurora-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }
        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: moveBlobs 20s infinite alternate;
        }
        .blob-1 { width: 600px; height: 600px; background: linear-gradient(135deg, #8b5cf6, #d946ef); top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); bottom: -150px; right: -100px; animation-delay: -5s; }
        .blob-3 { width: 400px; height: 400px; background: linear-gradient(135deg, #d946ef, #f472b6); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }
        @keyframes moveBlobs {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }
        .noise-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.03; z-index: -1; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-line);
            box-shadow: var(--glass-shadow);
        }
        .glass-strong {
            background: rgba(21, 18, 33, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6, #d946ef, #06b6d4, #8b5cf6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 8s ease infinite;
        }
        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 50;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(0);
        }
        .sidebar-expanded { width: 280px; }
        .sidebar-collapsed { width: 80px; }
        .sidebar-toggle-btn {
            position: absolute;
            right: -12px;
            top: 80px;
            width: 24px; height: 24px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
            transition: all 0.2s ease;
            z-index: 50;
        }
        .sidebar-toggle-btn:hover { transform: scale(1.1); }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
            width: 100%;
            background: transparent;
            cursor: pointer;
            position: relative;
        }
        .nav-link:hover { background: var(--surface-hover); color: var(--text-main); }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(217, 70, 239, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: var(--text-main);
        }
        .nav-link.active i { color: var(--primary); }
        .main-content {
            flex: 1;
            margin-left: 280px;
            transition: margin-left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-content.collapsed { margin-left: 80px; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .bento-item {
            background: var(--surface);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border-line);
            transition: all 0.3s ease;
        }
        .bento-item:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.2);
        }
        .bento-large { grid-column: span 2; grid-row: span 2; }
        .bento-wide { grid-column: span 2; }
        .bento-tall { grid-row: span 2; }
        @media (max-width: 1024px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
            .main-content { margin-left: 0 !important; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.mobile-open { transform: translateX(0); }
        }
        @media (max-width: 640px) {
            .bento-grid { grid-template-columns: 1fr; }
            .bento-large, .bento-wide { grid-column: span 1; }
        }
        .masonry { column-count: 1; column-gap: 1.5rem; }
        .masonry-item { break-inside: avoid; margin-bottom: 1.5rem; }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        .timeline-container { position: relative; padding-left: 2rem; }
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #8b5cf6, #d946ef, #06b6d4, transparent);
        }
        .timeline-dot {
            position: absolute;
            left: -5px;
            width: 14px; height: 14px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 50%;
            top: 24px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        .animate-pulse-glow { animation: pulseGlow 4s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #8b5cf6, #d946ef);
            border-radius: 4px;
        }
        .kinetic-title {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }
        .interactive-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -15px rgba(139, 92, 246, 0.3);
        }
        .glow-btn { position: relative; overflow: hidden; }
        .glow-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .glow-btn:hover::before { left: 100%; }
        .mobile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 40;
            display: none;
        }
        .mobile-overlay.active { display: block; }
        .view-section { display: none; animation: fadeInUp 0.4s ease-out; }
        .view-section.active { display: block; }
        .profile-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        .profile-modal.active { display: flex; }
        .profile-card {
            max-width: 550px;
            width: 90%;
            background: var(--surface-solid);
            border-radius: 2rem;
            border: 1px solid var(--border-line);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .file-upload-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
        }
        .file-upload-btn:hover { background: #7c3aed; transform: translateY(-1px); }
        .file-name { font-size: 0.75rem; color: var(--text-muted); margin-left: 0.5rem; }
        .brand-logo {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
        .login-logo {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 18px 35px rgba(0,0,0,0.35);
        }
        .danger-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.45rem 0.8rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .danger-btn:hover { background: #dc2626; }
        .image-zoom-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            cursor: pointer;
        }
        .image-zoom-modal.active {
            display: flex;
        }
        .image-zoom-modal img {
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .memory-img-container {
            cursor: pointer;
        }
        .student-profile-img {
            cursor: pointer;
        }
        .students-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }
        @media (min-width: 640px) {
            .students-grid { gap: 1.5rem; }
        }
        @media (min-width: 768px) {
            .students-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 1024px) {
            .students-grid { grid-template-columns: repeat(4, 1fr); }
        }
        .student-card {
            background: var(--surface-solid);
            border-radius: 1.5rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid var(--border-line);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .student-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.2);
        }
        @media (max-width: 480px) {
            .student-card { padding: 1rem; }
            .student-card .w-32 { width: 5rem; height: 5rem; }
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: white;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 2rem;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        .dark .google-btn {
            background: #2d2d3a;
            color: #eee;
            border-color: #444;
        }
        /* Dropdown menu styles */
        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: var(--surface-solid);
            border: 1px solid var(--border-line);
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            min-width: 200px;
            z-index: 50;
            overflow: hidden;
        }
        .dropdown-menu a, .dropdown-menu button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: var(--text-main);
            transition: background-color 0.2s;
        }
        .dropdown-menu a:hover, .dropdown-menu button:hover {
            background-color: var(--surface-hover);
        }
        .dropdown-divider {
            height: 1px;
            background-color: var(--border-line);
            margin: 0.25rem 0;
        }
        .user-info {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-line);
        }
        .user-name {
            font-weight: 600;
            font-size: 0.875rem;
        }
        .user-email {
            font-size: 0.75rem;
            color: var(--text-muted);
            word-break: break-all;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div class="aurora-bg"><div class="aurora-blob blob-1"></div><div class="aurora-blob blob-2"></div><div class="aurora-blob blob-3"></div></div>
    <div class="noise-overlay"></div>
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <aside class="sidebar sidebar-expanded glass border-r border-[var(--border-line)] flex flex-col" id="sidebar">
        <button class="sidebar-toggle-btn hidden md:flex" onclick="toggleSidebar()"><i class="fas fa-chevron-left text-xs" id="toggleIcon"></i></button>
        <div class="flex items-center justify-between px-6 py-6">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showView('home')">
                <img src="novus.jpg" alt="Novus logo" class="brand-logo">
                <span class="font-bold text-lg tracking-wide text-[var(--text-main)] sidebar-text">Novus</span>
            </div>
            <button onclick="closeMobileSidebar()" class="md:hidden text-[var(--text-muted)]"><i class="fas fa-times text-lg"></i></button>
        </div>
        <nav class="flex-1 px-3 space-y-1 overflow-y-auto">
            <button class="nav-link active" data-view="home" onclick="showView('home')"><div class="active-indicator absolute left-0 top-1/2 -translate-y-1/2 w-1 h-6 bg-[var(--primary)] rounded-r-full"></div><i class="fas fa-home text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Home</span></button>
            <button class="nav-link" data-view="students" onclick="showView('students')"><i class="fas fa-user-friends text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Students</span></button>
            <button class="nav-link" data-view="memories" onclick="showView('memories')"><i class="fas fa-images text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Memories</span></button>
            <button class="nav-link" data-view="quotes" onclick="showView('quotes')"><i class="fas fa-quote-right text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Student Stories</span></button>
            <button id="adminNavBtn" class="nav-link hidden" data-view="admin" onclick="showView('admin')"><i class="fas fa-crown text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Admin Panel</span></button>
        </nav>
        <div class="px-4 pb-6 countdown-widget">
            <div class="glass-strong rounded-2xl p-4 text-center">
                <p class="text-xs text-[var(--text-muted)] mb-1">11G • Class of 2026/27</p>
                <div class="mt-2 text-xs text-[var(--text-muted)]">📘 Junior Yearbook</div>
            </div>
        </div>
        <div class="px-4 pb-6 countdown-icon hidden justify-center">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-[var(--primary)] to-[var(--secondary)] flex items-center justify-center text-white"><i class="fas fa-school"></i></div>
        </div>
    </aside>

    <div class="main-content flex flex-col h-full" id="mainContent">
        <header class="flex items-center justify-between px-6 py-4 glass border-b border-[var(--border-line)] sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <button onclick="openMobileSidebar()" class="md:hidden text-[var(--text-muted)] w-10 h-10 flex items-center justify-center rounded-xl hover:bg-[var(--surface-hover)]"><i class="fas fa-bars text-lg"></i></button>
                <div class="hidden md:flex items-center gap-3">
                    <span class="font-semibold text-[var(--text-main)] tracking-wide text-sm">Novus • 11G Yearbook • Class of 2026/27</span>
                    <span class="px-2 py-1 rounded-full bg-[var(--primary)]/10 text-[var(--primary)] text-xs font-bold border border-[var(--primary)]/20">11G</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center text-[var(--text-muted)] rounded-xl hover:bg-[var(--surface-hover)]"><i class="fas fa-moon text-lg" id="themeIcon"></i></button>
                <div class="h-8 w-px bg-[var(--border-line)] hidden sm:block"></div>
                <div class="relative" id="avatarContainer">
                    <img id="headerAvatar" src="https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff" class="w-9 h-9 rounded-full border-2 border-transparent hover:border-[var(--primary)] transition-all shadow-lg cursor-pointer">
                    <div id="avatarDropdown" class="dropdown-menu hidden"></div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto overflow-x-hidden scroll-smooth" id="contentArea">
            <div id="view-home" class="view-section active"></div>
            <div id="view-students" class="view-section"></div>
            <div id="view-memories" class="view-section"></div>
            <div id="view-events" class="view-section"></div>
            <div id="view-quotes" class="view-section"></div>
            <div id="view-admin" class="view-section"></div>
        </main>
    </div>

    <!-- Login Modal – only Google button -->
    <div id="loginModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm" onclick="closeLogin()">
        <div class="glass-strong p-8 md:p-10 rounded-3xl w-[90%] max-w-md text-center" onclick="event.stopPropagation()">
            <img src="novus.jpg" alt="Novus logo" class="login-logo mx-auto mb-4">
            <h2 class="text-3xl font-bold text-[var(--text-main)] mb-2">Welcome to Novus</h2>
            <p class="text-[var(--text-muted)] mb-6">Sign in with your Google account to explore the yearbook</p>
            <button id="googleSignInBtn" class="google-btn w-full flex items-center justify-center gap-3">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
                </svg>
                Continue with Google
            </button>
            <div id="loginStatusMsg" class="text-center text-sm mt-4 text-yellow-300"></div>
        </div>
    </div>

    <div id="imageZoomModal" class="image-zoom-modal" onclick="closeImageZoom()">
        <img id="zoomImage" src="" alt="Zoomed image">
    </div>

    <script>
        const API_BASE = 'https://yearbook2.onrender.com/api';

        let token = localStorage.getItem('token');
        let currentUser = null;
        let allStudents = [];
        let allMemories = [];

        // ========== Helper Functions ==========
        function escapeHtml(str = '') {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        async function authFetch(endpoint, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...(token && { 'x-auth-token': token }),
                ...options.headers
            };
            const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }
            return res.json();
        }

        function openImageZoom(imageUrl) {
            const modal = document.getElementById('imageZoomModal');
            const zoomImg = document.getElementById('zoomImage');
            zoomImg.src = imageUrl;
            modal.classList.add('active');
        }

        function closeImageZoom() {
            const modal = document.getElementById('imageZoomModal');
            modal.classList.remove('active');
        }

        async function checkAdminStatusByUID(uid) {
            if (!uid) return false;
            try {
                const adminDoc = await window.firebaseGetDoc(window.firebaseDoc(window.firebaseDb, "admins", uid));
                return adminDoc.exists() && adminDoc.data().isAdmin === true;
            } catch (err) {
                console.error("Error checking admin by UID:", err);
                return false;
            }
        }

        async function loadAllData() {
            if (!token) return;
            try {
                const userData = await authFetch('/auth/me');
                currentUser = userData;

                let isAdmin = false;
                if (currentUser && currentUser.uid) {
                    isAdmin = await checkAdminStatusByUID(currentUser.uid);
                }
                if (!isAdmin && currentUser && currentUser.email === 'adminof11g@gmail.com') {
                    isAdmin = true;
                    console.log('✅ Hardcoded admin email detected:', currentUser.email);
                }

                document.getElementById('adminNavBtn').classList.toggle('hidden', !isAdmin);

                const allUsers = await authFetch('/profile/all');
                allStudents = allUsers.filter(u => u.isStudent === true).map(u => ({ ...u, id: u._id }));
                allMemories = await authFetch('/posts');
                allMemories = allMemories.map(p => ({ ...p, id: p._id }));
                renderAllViews();

                updateAvatarDropdown();
            } catch (err) {
                console.error('Failed to load data:', err);
                alert('Failed to load data. Please check your connection.\n' + err.message);
            }
        }

        // Redirect-only Google Sign-In
        async function handleGoogleSignIn() {
            const auth = window.firebaseAuth;
            const provider = window.firebaseProvider;
            const statusMsg = document.getElementById('loginStatusMsg');
            statusMsg.innerText = 'Redirecting to Google...';
            try {
                await window.firebaseSignInWithRedirect(auth, provider);
                // The page will redirect to Google, then come back
            } catch (err) {
                console.error('Redirect error:', err);
                statusMsg.innerText = 'Sign-in failed: ' + err.message;
            }
        }

        async function completeGoogleSignIn(user) {
            const idToken = await user.getIdToken();
            const uid = user.uid;
            const res = await fetch(`${API_BASE}/auth/google`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Google sign-in failed');

            data.user.uid = uid;
            data.user.authProvider = 'google';
            token = data.token;
            localStorage.setItem('token', token);
            await loadAllData();
            closeLogin();
            showView('home');
            document.getElementById('loginStatusMsg').innerText = '';
        }

        // Process the redirect result on page load
        async function handleRedirectResult() {
            const auth = window.firebaseAuth;
            const result = await window.firebaseGetRedirectResult(auth);
            if (result && result.user) {
                console.log('Redirect result found, completing sign-in...');
                await completeGoogleSignIn(result.user);
            }
        }

        // Listen for auth state changes (backup for redirect result)
        function setupAuthListener() {
            window.firebaseOnAuthStateChanged(window.firebaseAuth, async (user) => {
                if (user && !token) {
                    // This will happen if we didn't catch the redirect result for some reason
                    console.log('Auth state changed, user detected. Completing sign-in...');
                    await completeGoogleSignIn(user);
                }
            });
        }

        async function handleSignOut() {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            allStudents = [];
            allMemories = [];
            if (window.firebaseAuth) {
                await window.firebaseSignOut(window.firebaseAuth);
            }
            updateAvatarDropdown();
            renderAllViews();
            openLogin();
        }

        function updateAvatarDropdown() {
            const container = document.getElementById('avatarContainer');
            const dropdown = document.getElementById('avatarDropdown');
            const avatarImg = document.getElementById('headerAvatar');

            if (!currentUser) {
                avatarImg.src = 'https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff';
                dropdown.innerHTML = `
                    <div class="user-info">
                        <div class="user-name">Not signed in</div>
                    </div>
                    <div class="dropdown-divider"></div>
                    <button onclick="openLogin()" class="w-full text-left px-4 py-2 text-sm hover:bg-[var(--surface-hover)]">Sign In</button>
                `;
                return;
            }

            const displayName = currentUser.name || currentUser.email.split('@')[0];
            const userEmail = currentUser.email;
            const photoUrl = currentUser.profileImage || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=8b5cf6&color=fff`;
            avatarImg.src = photoUrl;

            dropdown.innerHTML = `
                <div class="user-info">
                    <div class="user-name">${escapeHtml(displayName)}</div>
                    <div class="user-email">${escapeHtml(userEmail)}</div>
                </div>
                <div class="dropdown-divider"></div>
                <button onclick="handleSignOut()" class="w-full text-left px-4 py-2 text-sm hover:bg-[var(--surface-hover)] text-red-500">Sign Out</button>
            `;
        }

        function toggleDropdown() {
            const dropdown = document.getElementById('avatarDropdown');
            dropdown.classList.toggle('hidden');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const container = document.getElementById('avatarContainer');
            const dropdown = document.getElementById('avatarDropdown');
            if (!container.contains(event.target)) {
                dropdown.classList.add('hidden');
            }
        });

        function openLogin() {
            document.getElementById('loginModal').style.display = 'flex';
        }
        function closeLogin() {
            document.getElementById('loginModal').style.display = 'none';
        }

        // Sidebar and theme
        let isSidebarCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
        function toggleSidebar() {
            isSidebarCollapsed = !isSidebarCollapsed;
            localStorage.setItem('sidebar-collapsed', isSidebarCollapsed);
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('mainContent');
            const icon = document.getElementById('toggleIcon');
            const texts = document.querySelectorAll('.sidebar-text');
            const widget = document.querySelector('.countdown-widget');
            const iconWidget = document.querySelector('.countdown-icon');
            if (isSidebarCollapsed) {
                sidebar.classList.remove('sidebar-expanded'); sidebar.classList.add('sidebar-collapsed');
                main.classList.add('collapsed'); icon.className = 'fas fa-chevron-right text-xs';
                texts.forEach(el => el.style.display = 'none');
                widget.style.display = 'none'; iconWidget.classList.remove('hidden'); iconWidget.classList.add('flex');
            } else {
                sidebar.classList.remove('sidebar-collapsed'); sidebar.classList.add('sidebar-expanded');
                main.classList.remove('collapsed'); icon.className = 'fas fa-chevron-left text-xs';
                texts.forEach(el => el.style.display = 'block');
                widget.style.display = 'block'; iconWidget.classList.add('hidden'); iconWidget.classList.remove('flex');
            }
        }

        function openMobileSidebar() {
            document.getElementById('sidebar').classList.add('mobile-open');
            document.getElementById('mobileOverlay').classList.add('active');
        }

        function closeMobileSidebar() {
            document.getElementById('sidebar').classList.remove('mobile-open');
            document.getElementById('mobileOverlay').classList.remove('active');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fas fa-moon text-lg';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.className = 'fas fa-sun text-lg';
                localStorage.setItem('theme', 'dark');
            }
        }

        function showView(viewName) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            const target = document.getElementById(`view-${viewName}`);
            if (target) target.classList.add('active');
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.querySelector(`.nav-link[data-view="${viewName}"]`);
            if (activeLink) activeLink.classList.add('active');
            closeMobileSidebar();
        }

        // ========== Admin Functions ==========
        async function addStudentFromForm() {
            if (!currentUser) return alert('Not logged in');
            const name = document.getElementById('newName').value.trim();
            let email = document.getElementById('newEmail').value.trim();
            const quote = document.getElementById('newQuote').value.trim();
            const dream = document.getElementById('newDream').value.trim();
            const hobby = document.getElementById('newHobby').value.trim();
            const aspiration = document.getElementById('newAspiration').value.trim();
            const funFact = document.getElementById('newFunFact').value.trim();
            const photoFile = document.getElementById('newPhoto').files[0];
            if (!name) return alert('Name is required');
            if (!email) email = `student-${Date.now()}@novus.local`;
            const formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            formData.append('password', 'student123');
            formData.append('quote', quote);
            formData.append('dream', dream);
            formData.append('hobby', hobby);
            formData.append('aspiration', aspiration);
            formData.append('funFact', funFact);
            if (photoFile) formData.append('profileImage', photoFile);
            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'x-auth-token': token },
                    body: formData
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to add student');
                alert('Student added');
                await loadAllData();
                document.getElementById('newName').value = '';
                document.getElementById('newEmail').value = '';
                document.getElementById('newQuote').value = '';
                document.getElementById('newDream').value = '';
                document.getElementById('newHobby').value = '';
                document.getElementById('newAspiration').value = '';
                document.getElementById('newFunFact').value = '';
                document.getElementById('newPhoto').value = '';
                document.getElementById('file-name').innerText = 'No file chosen';
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function editStudent(id) {
            if (!currentUser) return alert('Not logged in');
            const student = allStudents.find(s => s.id === id);
            if (!student) return;
            const newName = prompt('New name', student.name);
            if (!newName) return;
            const newQuote = prompt('Quote', student.quote || '');
            const newDream = prompt('Dream', student.dream || '');
            const newHobby = prompt('Hobby', student.hobby || '');
            const newAspiration = prompt('Aspiration', student.aspiration || '');
            const newFunFact = prompt('Fun Fact', student.funFact || '');
            try {
                await authFetch(`/profile/update/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        name: newName,
                        quote: newQuote,
                        dream: newDream,
                        hobby: newHobby,
                        aspiration: newAspiration,
                        funFact: newFunFact
                    })
                });
                await loadAllData();
            } catch (err) {
                alert('Update failed: ' + err.message);
            }
        }

        async function updateStudentPhoto(id) {
            if (!currentUser) return alert('Not logged in');
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const formData = new FormData();
                formData.append('profileImage', file);
                try {
                    const res = await fetch(`${API_BASE}/profile/update/${id}`, {
                        method: 'PUT',
                        headers: { 'x-auth-token': token },
                        body: formData
                    });
                    if (!res.ok) throw new Error('Upload failed');
                    alert('Photo updated successfully');
                    await loadAllData();
                } catch (err) {
                    alert('Error updating photo: ' + err.message);
                }
            };
            input.click();
        }

        async function deleteStudent(id) {
            if (!currentUser) return alert('Not logged in');
            if (!confirm('Delete this student?')) return;
            try {
                await authFetch(`/profile/deactivate/${id}`, { method: 'DELETE' });
                await loadAllData();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }

        async function createPostFromForm() {
            if (!currentUser) return alert('Not logged in');
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const imageFile = document.getElementById('postImage').files[0];
            if (!title) return alert('Title required');
            const formData = new FormData();
            formData.append('content', `${title}\n${content}`);
            if (imageFile) formData.append('image', imageFile);
            try {
                const res = await fetch(`${API_BASE}/posts/create`, {
                    method: 'POST',
                    headers: { 'x-auth-token': token },
                    body: formData
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Failed to create memory');
                alert('Memory added!');
                await loadAllData();
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
                document.getElementById('postImage').value = '';
                document.getElementById('post-file-name').innerText = 'No file chosen';
                showView('memories');
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function deleteMemory(id) {
            if (!currentUser) return alert('Not logged in');
            if (!confirm('Delete this memory?')) return;
            try {
                await authFetch(`/posts/${id}`, { method: 'DELETE' });
                await loadAllData();
                showView('memories');
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }

        // ========== Rendering Functions ==========
        // (These are identical to your last working version. I'll include placeholders – you must keep your full functions.)
        function renderHome() { /* your existing renderHome */ }
        function renderStudents() { /* your existing renderStudents */ }
        function renderStudentGrid(filter) { /* your existing */ }
        function openStudentModal(id) { /* your existing */ }
        function renderMemories() { /* your existing */ }
        function renderEvents() { /* your existing */ }
        function renderStories() { /* your existing */ }
        function renderAdminPanel() { /* your existing */ }
        function renderAllViews() {
            renderHome();
            renderStudents();
            renderMemories();
            renderEvents();
            renderStories();
            renderAdminPanel();
        }

        // Attach dropdown event
        document.getElementById('avatarContainer').addEventListener('click', function(e) {
            e.stopPropagation();
            toggleDropdown();
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
                document.getElementById('themeIcon').className = 'fas fa-moon text-lg';
            }
            if (isSidebarCollapsed) toggleSidebar();

            setupAuthListener();            // Listen for auth state changes
            await handleRedirectResult();   // Process any redirect result

            token = localStorage.getItem('token');
            if (token) {
                try {
                    await loadAllData();
                    closeLogin();
                    showView('home');
                } catch (err) {
                    console.error(err);
                    localStorage.removeItem('token');
                    token = null;
                    openLogin();
                }
            } else {
                openLogin();
            }
        });

        document.getElementById('googleSignInBtn').addEventListener('click', handleGoogleSignIn);

        window.deleteMemory = deleteMemory;
        window.editStudent = editStudent;
        window.deleteStudent = deleteStudent;
        window.updateStudentPhoto = updateStudentPhoto;
        window.showView = showView;
        window.closeStudentModal = closeStudentModal;
        window.addStudentFromForm = addStudentFromForm;
        window.createPostFromForm = createPostFromForm;
        window.openImageZoom = openImageZoom;
        window.closeImageZoom = closeImageZoom;
        window.handleSignOut = handleSignOut;
        window.openLogin = openLogin;
    </script>
</body>
