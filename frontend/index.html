<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Novus | 11G Yearbook • Class of 2026/27</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#8b5cf6', secondary: '#d946ef', accent: '#06b6d4' },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8fafc; --surface: rgba(255, 255, 255, 0.85); --surface-solid: #ffffff;
            --surface-hover: rgba(241, 245, 249, 1); --text-main: #0f172a; --text-muted: #64748b;
            --border-line: rgba(0, 0, 0, 0.08); --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.05);
            --primary: #8b5cf6; --secondary: #d946ef; --accent: #06b6d4;
        }
        .dark {
            --bg: #0a0812; --surface: rgba(21, 18, 33, 0.85); --surface-solid: #151221;
            --surface-hover: rgba(28, 24, 43, 1); --text-main: #f8fafc; --text-muted: #94a3b8;
            --border-line: rgba(255, 255, 255, 0.05); --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.3);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); transition: all 0.3s ease; overflow-x: hidden; }
        .aurora-bg { position: fixed; inset: 0; z-index: -2; overflow: hidden; pointer-events: none; }
        .aurora-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: moveBlobs 20s infinite alternate; }
        .blob-1 { width: 600px; height: 600px; background: linear-gradient(135deg, #8b5cf6, #d946ef); top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); bottom: -150px; right: -100px; animation-delay: -5s; }
        @keyframes moveBlobs { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.1); } }
        .glass { background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--border-line); box-shadow: var(--glass-shadow); }
        .glass-strong { background: rgba(21, 18, 33, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #8b5cf6, #d946ef, #06b6d4, #8b5cf6); background-size: 300% 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientMove 8s ease infinite; }
        @keyframes gradientMove { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .sidebar { position: fixed; top: 0; left: 0; height: 100vh; z-index: 50; transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1); transform: translateX(0); }
        .sidebar-expanded { width: 280px; } .sidebar-collapsed { width: 80px; }
        .nav-link { display: flex; align-items: center; gap: 1rem; padding: 0.875rem 1rem; border-radius: 0.75rem; color: var(--text-muted); transition: all 0.3s ease; width: 100%; cursor: pointer; }
        .nav-link:hover { background: var(--surface-hover); color: var(--text-main); }
        .nav-link.active { background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(217, 70, 239, 0.05)); border: 1px solid rgba(139, 92, 246, 0.3); color: var(--text-main); }
        .main-content { flex: 1; margin-left: 280px; transition: margin-left 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .main-content.collapsed { margin-left: 80px; }
        @media (max-width: 1024px) { .main-content { margin-left: 0 !important; } .sidebar { transform: translateX(-100%); } .sidebar.mobile-open { transform: translateX(0); } }
        .bento-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .bento-item { background: var(--surface); border-radius: 24px; padding: 1.5rem; border: 1px solid var(--border-line); transition: all 0.3s ease; }
        .masonry { column-count: 1; column-gap: 1.5rem; }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        .view-section { display: none; animation: fadeInUp 0.4s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .profile-modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
        .profile-modal.active { display: flex; }
        .profile-card { max-width: 550px; width: 92%; background: var(--surface-solid); border-radius: 2rem; border: 1px solid var(--border-line); max-height: 90vh; overflow-y: auto; }
        .brand-logo { width: 40px; height: 40px; border-radius: 12px; }
        .hero-logo { width: min(300px, 60vw); height: auto; margin: 0 auto 1rem; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div class="aurora-bg"><div class="aurora-blob blob-1"></div><div class="aurora-blob blob-2"></div></div>
    <div class="mobile-overlay fixed inset-0 bg-black/50 z-40 hidden" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <aside class="sidebar sidebar-expanded glass border-r border-[var(--border-line)] flex flex-col" id="sidebar">
        <div class="flex items-center justify-between px-6 py-6">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showView('home')">
                <img src="novus.jpg" alt="Novus" class="brand-logo">
                <span class="font-bold text-lg sidebar-text">Novus</span>
            </div>
            <button onclick="closeMobileSidebar()" class="md:hidden text-[var(--text-muted)]"><i class="fas fa-times"></i></button>
        </div>
        <nav class="flex-1 px-3 space-y-1 overflow-y-auto">
            <button class="nav-link active" data-view="home" onclick="showView('home')"><i class="fas fa-home w-6"></i><span class="sidebar-text">Home</span></button>
            <button class="nav-link" data-view="students" onclick="showView('students')"><i class="fas fa-user-friends w-6"></i><span class="sidebar-text">Students</span></button>
            <button class="nav-link" data-view="memories" onclick="showView('memories')"><i class="fas fa-images w-6"></i><span class="sidebar-text">Memories</span></button>
            <button class="nav-link" data-view="quotes" onclick="showView('quotes')"><i class="fas fa-quote-right w-6"></i><span class="sidebar-text">Stories</span></button>
            <button id="adminNavBtn" class="nav-link hidden" data-view="admin" onclick="showView('admin')"><i class="fas fa-crown w-6"></i><span class="sidebar-text">Admin</span></button>
        </nav>
        <div class="p-4"><div class="glass-strong rounded-xl p-3 text-center text-xs"><p class="text-[var(--text-muted)]">11G • Class of 2027</p></div></div>
    </aside>

    <div class="main-content flex flex-col h-full" id="mainContent">
        <header class="flex items-center justify-between px-6 py-4 glass border-b border-[var(--border-line)] sticky top-0 z-30">
            <button onclick="openMobileSidebar()" class="md:hidden text-[var(--text-muted)] w-10 h-10 flex items-center justify-center rounded-xl"><i class="fas fa-bars"></i></button>
            <div class="hidden md:block font-semibold text-sm">Novus • 11G Yearbook</div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center text-[var(--text-muted)] rounded-xl"><i class="fas fa-adjust"></i></button>
                <img id="headerAvatar" src="https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff" class="w-9 h-9 rounded-full cursor-pointer" onclick="openLogin()">
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8" id="contentArea">
            <div id="view-home" class="view-section active"></div>
            <div id="view-students" class="view-section"></div>
            <div id="view-memories" class="view-section"></div>
            <div id="view-quotes" class="view-section"></div>
            <div id="view-admin" class="view-section"></div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
        <div class="glass-strong p-8 rounded-3xl w-[92%] max-w-md relative border border-white/10" onclick="event.stopPropagation()">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold mb-2">Welcome to Novus</h2>
                <p class="text-[var(--text-muted)] text-sm">Sign in to explore the yearbook</p>
            </div>
            <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();" class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email" class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-white">
                <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-black/20 border border-white/10 rounded-xl p-3 text-white">
                <button type="submit" id="loginSubmitBtn" class="w-full py-3 rounded-xl bg-primary text-white font-bold">Sign In</button>
            </form>
            <div id="loginStatusMsg" class="text-center text-xs mt-4 text-red-400"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://yearbook2.onrender.com/api';
        let token = localStorage.getItem('token');
        let currentUser = null, allStudents = [], allMemories = [];

        async function authFetch(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...(token && { 'x-auth-token': token }), ...options.headers };
            const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadAllData() {
            if (!token) return;
            try {
                currentUser = await authFetch('/auth/me');
                document.getElementById('adminNavBtn').classList.toggle('hidden', !currentUser.isAdmin);
                const users = await authFetch('/profile/all');
                allStudents = users.filter(u => u.isStudent).map(u => ({ ...u, id: u._id }));
                allMemories = (await authFetch('/posts')).map(p => ({ ...p, id: p._id }));
                renderAll();
            } catch (e) { localStorage.removeItem('token'); openLogin(); }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginSubmitBtn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...';
            try {
                const res = await fetch(`${API_BASE}/auth/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                token = data.token; localStorage.setItem('token', token);
                await loadAllData(); document.getElementById('loginModal').classList.add('hidden');
            } catch (e) { document.getElementById('loginStatusMsg').innerText = e.message; }
            finally { btn.disabled = false; btn.innerText = 'Sign In'; }
        }

        function showView(name) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${name}`).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.dataset.view === name));
            if (window.innerWidth < 1024) closeMobileSidebar();
        }

        function openMobileSidebar() { document.getElementById('sidebar').classList.add('mobile-open'); document.getElementById('mobileOverlay').classList.remove('hidden'); }
        function closeMobileSidebar() { document.getElementById('sidebar').classList.remove('mobile-open'); document.getElementById('mobileOverlay').classList.add('hidden'); }
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function openLogin() { document.getElementById('loginModal').classList.remove('hidden'); }

        function renderAll() {
            renderHome(); renderStudents(); renderMemories(); renderStories(); renderAdmin();
        }

        function renderHome() {
            document.getElementById('view-home').innerHTML = `
                <div class="text-center py-10">
                    <img src="novus.jpg" class="hero-logo rounded-2xl shadow-2xl mb-6">
                    <h1 class="text-5xl font-black gradient-text mb-4">Novus 11G</h1>
                    <p class="text-[var(--text-muted)] max-w-md mx-auto mb-8">Capturing the journey of the Class of 2027.</p>
                    <div class="bento-grid max-w-4xl mx-auto">
                        <div class="bento-item">
                            <div class="text-3xl font-bold text-primary">${allStudents.length}</div>
                            <div class="text-sm text-[var(--text-muted)]">Students</div>
                        </div>
                        <div class="bento-item">
                            <div class="text-3xl font-bold text-secondary">${allMemories.length}</div>
                            <div class="text-sm text-[var(--text-muted)]">Memories</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStudents() {
            document.getElementById('view-students').innerHTML = `
                <h2 class="text-3xl font-bold mb-8">Class Directory</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    ${allStudents.map(s => `
                        <div class="glass p-4 rounded-2xl text-center hover:scale-105 transition">
                            <img src="${s.profileImage || 'https://ui-avatars.com/api/?name='+s.name}" class="w-24 h-24 rounded-full mx-auto mb-3 object-cover border-2 border-primary">
                            <div class="font-bold text-sm">${s.name}</div>
                            <div class="text-xs text-[var(--text-muted)] italic mt-1">"${s.quote || 'Rising star'}"</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderMemories() {
            document.getElementById('view-memories').innerHTML = `
                <h2 class="text-3xl font-bold mb-8">Moments</h2>
                <div class="masonry">
                    ${allMemories.map(m => `
                        <div class="glass rounded-2xl overflow-hidden mb-4">
                            <img src="${m.image || 'https://picsum.photos/400/300'}" class="w-full">
                            <div class="p-4"><p class="text-sm font-medium">${m.content || ''}</p></div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderStories() {
            document.getElementById('view-quotes').innerHTML = `
                <h2 class="text-3xl font-bold mb-8 text-center">Student Stories</h2>
                <div class="grid gap-6 md:grid-cols-2">
                    ${allStudents.map(s => `
                        <div class="glass p-6 rounded-2xl">
                            <i class="fas fa-quote-left text-primary/20 text-3xl mb-2"></i>
                            <p class="text-lg italic mb-4">"${s.quote || 'The future is bright.'}"</p>
                            <div class="flex items-center gap-3">
                                <div class="font-bold">${s.name}</div>
                                <div class="text-xs text-[var(--text-muted)]">• ${s.aspiration || 'Dreamer'}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderAdmin() {
            if (!currentUser?.isAdmin) return;
            document.getElementById('view-admin').innerHTML = `
                <div class="max-w-2xl mx-auto space-y-8">
                    <div class="glass p-6 rounded-2xl">
                        <h3 class="text-xl font-bold mb-6">Add New Student</h3>
                        <form onsubmit="event.preventDefault(); addStudent(this);" class="space-y-4">
                            <div class="grid gap-4 sm:grid-cols-2">
                                <div class="space-y-1">
                                    <label class="text-xs font-bold text-[var(--text-muted)] uppercase">Full Name</label>
                                    <input name="name" required class="w-full bg-[var(--surface-hover)] border border-[var(--border-line)] rounded-xl p-3 text-sm" placeholder="e.g. John Doe">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-xs font-bold text-[var(--text-muted)] uppercase">Email</label>
                                    <input name="email" type="email" class="w-full bg-[var(--surface-hover)] border border-[var(--border-line)] rounded-xl p-3 text-sm" placeholder="student@novus.local">
                                </div>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-[var(--text-muted)] uppercase">Yearbook Quote</label>
                                <textarea name="quote" rows="2" class="w-full bg-[var(--surface-hover)] border border-[var(--border-line)] rounded-xl p-3 text-sm" placeholder="Something inspiring..."></textarea>
                            </div>
                            <div class="grid gap-4 sm:grid-cols-2">
                                <input name="dream" placeholder="Dream Career" class="w-full bg-[var(--surface-hover)] border border-[var(--border-line)] rounded-xl p-3 text-sm">
                                <input name="hobby" placeholder="Favorite Hobby" class="w-full bg-[var(--surface-hover)] border border-[var(--border-line)] rounded-xl p-3 text-sm">
                            </div>
                            <button type="submit" class="w-full py-3 bg-primary text-white font-bold rounded-xl">Add Student</button>
                        </form>
                    </div>
                </div>
            `;
        }

        async function addStudent(form) {
            const formData = new FormData(form);
            const body = Object.fromEntries(formData);
            body.password = 'student123'; body.isStudent = true;
            try {
                await authFetch('/auth/register', { method: 'POST', body: JSON.stringify(body) });
                alert('Student added!'); await loadAllData(); form.reset();
            } catch (e) { alert(e.message); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (token) loadAllData(); else openLogin();
        });
    </script>
</body>
</html>
