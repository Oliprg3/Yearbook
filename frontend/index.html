<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Novus | 11G Yearbook • Class of 2026/27</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8b5cf6',
                        secondary: '#d946ef',
                        accent: '#06b6d4',
                    },
                }
            }
        }
    </script>
    <style>
        /* All styles remain exactly as before – unchanged */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.85);
            --surface-solid: #ffffff;
            --surface-hover: rgba(241, 245, 249, 1);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-line: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.05);
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --accent: #06b6d4;
        }
        .dark {
            --bg: #0a0812;
            --surface: rgba(21, 18, 33, 0.85);
            --surface-solid: #151221;
            --surface-hover: rgba(28, 24, 43, 1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-line: rgba(255, 255, 255, 0.05);
            --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.3);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }
        .aurora-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }
        .aurora-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: moveBlobs 20s infinite alternate;
        }
        .blob-1 { width: 600px; height: 600px; background: linear-gradient(135deg, #8b5cf6, #d946ef); top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); bottom: -150px; right: -100px; animation-delay: -5s; }
        .blob-3 { width: 400px; height: 400px; background: linear-gradient(135deg, #d946ef, #f472b6); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -10s; }
        @keyframes moveBlobs {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }
        .noise-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0.03; z-index: -1; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-line);
            box-shadow: var(--glass-shadow);
        }
        .glass-strong {
            background: rgba(21, 18, 33, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #8b5cf6, #d946ef, #06b6d4, #8b5cf6);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 8s ease infinite;
        }
        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 50;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(0);
        }
        .sidebar-expanded { width: 280px; }
        .sidebar-collapsed { width: 80px; }
        .sidebar-toggle-btn {
            position: absolute;
            right: -12px;
            top: 80px;
            width: 24px; height: 24px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.4);
            transition: all 0.2s ease;
            z-index: 50;
        }
        .sidebar-toggle-btn:hover { transform: scale(1.1); }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
            width: 100%;
            background: transparent;
            cursor: pointer;
            position: relative;
        }
        .nav-link:hover { background: var(--surface-hover); color: var(--text-main); }
        .nav-link.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(217, 70, 239, 0.05));
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: var(--text-main);
        }
        .nav-link.active i { color: var(--primary); }
        .main-content {
            flex: 1;
            margin-left: 280px;
            transition: margin-left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-content.collapsed { margin-left: 80px; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        .bento-item {
            background: var(--surface);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid var(--border-line);
            transition: all 0.3s ease;
        }
        .bento-item:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.2);
        }
        .bento-large { grid-column: span 2; grid-row: span 2; }
        .bento-wide { grid-column: span 2; }
        .bento-tall { grid-row: span 2; }
        @media (max-width: 1024px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
            .main-content { margin-left: 0 !important; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.mobile-open { transform: translateX(0); }
        }
        @media (max-width: 640px) {
            .bento-grid { grid-template-columns: 1fr; }
            .bento-large, .bento-wide { grid-column: span 1; }
        }
        .masonry { column-count: 1; column-gap: 1.5rem; }
        .masonry-item { break-inside: avoid; margin-bottom: 1.5rem; }
        @media (min-width: 640px) { .masonry { column-count: 2; } }
        @media (min-width: 1024px) { .masonry { column-count: 3; } }
        .timeline-container { position: relative; padding-left: 2rem; }
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, #8b5cf6, #d946ef, #06b6d4, transparent);
        }
        .timeline-dot {
            position: absolute;
            left: -5px;
            width: 14px; height: 14px;
            background: var(--bg);
            border: 3px solid var(--primary);
            border-radius: 50%;
            top: 24px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }
        .animate-pulse-glow { animation: pulseGlow 4s ease-in-out infinite; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #8b5cf6, #d946ef);
            border-radius: 4px;
        }
        .kinetic-title {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }
        .interactive-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -15px rgba(139, 92, 246, 0.3);
        }
        .glow-btn { position: relative; overflow: hidden; }
        .glow-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .glow-btn:hover::before { left: 100%; }
        .mobile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 40;
            display: none;
        }
        .mobile-overlay.active { display: block; }
        .view-section { display: none; animation: fadeInUp 0.4s ease-out; }
        .view-section.active { display: block; }
        .profile-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        .profile-modal.active { display: flex; }
        .profile-card {
            max-width: 550px;
            width: 90%;
            background: var(--surface-solid);
            border-radius: 2rem;
            border: 1px solid var(--border-line);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        .file-upload-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
        }
        .file-upload-btn:hover { background: #7c3aed; transform: translateY(-1px); }
        .file-name { font-size: 0.75rem; color: var(--text-muted); margin-left: 0.5rem; }
        .brand-logo {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
        .hero-logo {
            width: min(420px, 75vw);
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 18px 40px rgba(139, 92, 246, 0.35));
            margin: 0 auto 1.25rem;
            display: block;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 18px 35px rgba(0,0,0,0.35);
        }
        .hero-logo-wrap { display: flex; justify-content: center; align-items: center; }
        .danger-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 0.75rem;
            padding: 0.45rem 0.8rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .danger-btn:hover { background: #dc2626; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <div class="aurora-bg"><div class="aurora-blob blob-1"></div><div class="aurora-blob blob-2"></div><div class="aurora-blob blob-3"></div></div>
    <div class="noise-overlay"></div>
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <aside class="sidebar sidebar-expanded glass border-r border-[var(--border-line)] flex flex-col" id="sidebar">

        <div class="flex items-center justify-between px-6 py-6">

        </div>
        <nav class="flex-1 px-3 space-y-1 overflow-y-auto">
            <button class="nav-link active" data-view="home" onclick="showView('home')"><div class="active-indicator absolute left-0 top-1/2 -translate-y-1/2 w-1 h-6 bg-[var(--primary)] rounded-r-full"></div><i class="fas fa-home text-lg w-6 text-center"></i><span class="font-medium sidebar-text">Home</span></button>

        <main class="flex-1 overflow-y-auto overflow-x-hidden scroll-smooth" id="contentArea">

    <div id="loginModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm" onclick="closeLogin()">
        <div class="glass-strong p-8 md:p-10 rounded-3xl w-[90%] max-w-md relative border border-white/10 shadow-2xl" onclick="event.stopPropagation()">
            <div class="text-center mb-8">
                <img src="novus.jpg" alt="Novus logo" class="login-logo mx-auto mb-4">
                <h2 class="text-3xl font-bold text-[var(--text-main)] mb-2">Welcome to Novus</h2>
                <p class="text-[var(--text-muted)] text-sm">Sign in to explore the yearbook</p>
            </div>
            <form onsubmit="event.preventDefault(); handleLogin();" class="space-y-4">
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-[var(--text-muted)]"></i>
                    <input type="email" id="loginEmail" placeholder="Email" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-[var(--text-main)] focus:outline-none focus:border-[var(--primary)]">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-[var(--text-muted)]"></i>
                    <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-12 pr-4 text-[var(--text-main)] focus:outline-none focus:border-[var(--primary)]">
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="switchToSignup()" class="flex-1 py-3 rounded-xl bg-black/20 border border-white/10 text-[var(--text-main)] font-medium hover:bg-white/10">Sign Up</button>
                    <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-[var(--primary)] to-[var(--secondary)] text-white font-bold">Sign In</button>
                </div>
            </form>
            <div id="signupForm" style="display:none;" class="mt-6 pt-6 border-t border-white/10">
                <div class="space-y-4">
                    <input type="text" id="signupName" placeholder="Full Name" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4">
                    <input type="email" id="signupEmail" placeholder="Email" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4">
                    <input type="password" id="signupPassword" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 px-4">
                    <button onclick="handleSignup()" class="w-full py-3 rounded-xl bg-gradient-to-r from-[var(--primary)] to-[var(--secondary)] text-white font-bold">Create Account</button>
                    <p class="text-center text-sm text-[var(--text-muted)]">Already have an account? <a href="#" onclick="switchToLogin()" class="text-[var(--primary)] hover:underline">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== BACKEND CONFIGURATION ==========
        const API_BASE = 'https://yearbook2.onrender.com/api';

        let token = localStorage.getItem('token');
        let currentUser = null;
        let allStudents = [];
        let allMemories = [];

        // Helper: escape HTML
        function escapeHtml(str = '') {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Helper: fetch with auth header
        async function authFetch(endpoint, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...(token && { 'x-auth-token': token }),
                ...options.headers
            };
            const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }
            return res.json();
        }

        // ========== DATA LOADING ==========
        async function loadAllData() {
            if (!token) return;
            try {
                const userData = await authFetch('/auth/me');
                currentUser = userData;
                const isAdmin = currentUser.isAdmin === true;
                document.getElementById('adminNavBtn').classList.toggle('hidden', !isAdmin);
                const allUsers = await authFetch('/profile/all');
                allStudents = allUsers.filter(u => !u.isAdmin);
                allMemories = await authFetch('/posts');
                renderAllViews();
            } catch (err) {
                console.error('Failed to load data:', err);
                alert('Failed to load data. Please check your connection.');
            }
        }

        // ========== AUTHENTICATION ==========
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) return alert('Please fill all fields');

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.msg || 'Login failed');

                token = data.token;
                localStorage.setItem('token', token);
                await loadAllData();
                closeLogin();
                showView('home');
            } catch (err) {
                alert(err.message);
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            if (!name || !email || !password) return alert('Please fill all fields');

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, year: 2027 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.msg || 'Registration failed');

                token = data.token;
                localStorage.setItem('token', token);
                await loadAllData();
                closeLogin();
                showView('home');
            } catch (err) {
                alert(err.message);
            }
        }

        function switchToSignup() {
            document.getElementById('signupForm').style.display = 'block';
            document.querySelector('#loginModal form').style.display = 'none';
        }

        function switchToLogin() {
            document.getElementById('signupForm').style.display = 'none';

        let isSidebarCollapsed = localStorage.getItem('sidebar-collapsed') === 'true';
        function toggleSidebar() {
            isSidebarCollapsed = !isSidebarCollapsed;
            localStorage.setItem('sidebar-collapsed', isSidebarCollapsed);
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('mainContent');
            const icon = document.getElementById('toggleIcon');
            const texts = document.querySelectorAll('.sidebar-text');
            const widget = document.querySelector('.countdown-widget');
            const iconWidget = document.querySelector('.countdown-icon');
            if (isSidebarCollapsed) {
                sidebar.classList.remove('sidebar-expanded'); sidebar.classList.add('sidebar-collapsed');
                main.classList.add('collapsed'); icon.className = 'fas fa-chevron-right text-xs';
                texts.forEach(el => el.style.display = 'none');
                widget.style.display = 'none'; iconWidget.classList.remove('hidden'); iconWidget.classList.add('flex');
            } else {
                sidebar.classList.remove('sidebar-collapsed'); sidebar.classList.add('sidebar-expanded');
                main.classList.remove('collapsed'); icon.className = 'fas fa-chevron-left text-xs';
                texts.forEach(el => el.style.display = 'block');
                widget.style.display = 'block'; iconWidget.classList.add('hidden'); iconWidget.classList.remove('flex');
            }
        }

        function openMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.add('mobile-open');
            overlay.classList.add('active');
        }

        function closeMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            sidebar.classList.remove('mobile-open');
            overlay.classList.remove('active');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'fas fa-moon text-lg';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.className = 'fas fa-sun text-lg';
                localStorage.setItem('theme', 'dark');
            }
        }

            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));

            if (target) target.classList.add('active');

            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            const activeLink = document.querySelector(`.nav-link[data-view="${viewName}"]`);

                activeLink.classList.add('active');

        // ========== ADMIN FUNCTIONS (students) ==========
        async function addStudentFromForm() {
            if (!currentUser || !currentUser.isAdmin) return alert('Only admin can add students');

            const name = document.getElementById('newName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const quote = document.getElementById('newQuote').value.trim();
            const dream = document.getElementById('newDream').value.trim();
            const hobby = document.getElementById('newHobby').value.trim();
            const aspiration = document.getElementById('newAspiration').value.trim();
            const funFact = document.getElementById('newFunFact').value.trim();
            const photoFile = document.getElementById('newPhoto').files[0];

            if (!name || !email) return alert('Name and email required');

            const formData = new FormData();
            formData.append('name', name);
            formData.append('email', email);
            formData.append('password', 'student123');
            formData.append('quote', quote);
            formData.append('dream', dream);
            formData.append('hobby', hobby);
            formData.append('aspiration', aspiration);
            formData.append('funFact', funFact);
            if (photoFile) formData.append('profileImage', photoFile);

            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'x-auth-token': token },
                    body: formData
                });
                if (!res.ok) throw new Error(await res.text());
                alert('Student added');
                await loadAllData();
                // Clear form
                document.getElementById('newName').value = '';
                document.getElementById('newEmail').value = '';
                document.getElementById('newQuote').value = '';
                document.getElementById('newDream').value = '';
                document.getElementById('newHobby').value = '';
                document.getElementById('newAspiration').value = '';
                document.getElementById('newFunFact').value = '';
                document.getElementById('newPhoto').value = '';
                document.getElementById('file-name').innerText = 'No file chosen';
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function editStudent(id) {
            if (!currentUser || !currentUser.isAdmin) return alert('Only admin can edit');
            const student = allStudents.find(s => s.id === id);
            if (!student) return;

            const newName = prompt('New name', student.name);
            if (!newName) return;
            const newQuote = prompt('Quote', student.quote || '');
            const newDream = prompt('Dream', student.dream || '');
            const newHobby = prompt('Hobby', student.hobby || '');
            const newAspiration = prompt('Aspiration', student.aspiration || '');
            const newFunFact = prompt('Fun Fact', student.funFact || '');

            try {
                await authFetch(`/profile/update/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        name: newName,
                        quote: newQuote,
                        dream: newDream,
                        hobby: newHobby,
                        aspiration: newAspiration,
                        funFact: newFunFact
                    })
                });
                await loadAllData();
            } catch (err) {
                alert('Update failed: ' + err.message);
            }
        }

        async function deleteStudent(id) {
            if (!currentUser || !currentUser.isAdmin) return alert('Only admin can delete');
            if (!confirm('Delete this student?')) return;
            try {
                await authFetch(`/profile/deactivate/${id}`, { method: 'DELETE' });
                await loadAllData();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }

        // ========== MEMORY FUNCTIONS ==========
        async function createPostFromForm() {
            if (!currentUser || !currentUser.isAdmin) return alert('Only admin can create memories');

            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const imageFile = document.getElementById('postImage').files[0];

            if (!title) return alert('Title required');

            const formData = new FormData();
            formData.append('content', `${title}\n${content}`);

                const title = escapeHtml(p.content?.split('\n')[0] || 'Memory');
                const desc = escapeHtml(p.content?.split('\n').slice(1).join(' ') || '');
                const image = p.image || 'https://images.unsplash.com/photo-1523580494112-071d45815615?w=800';
                return `<div class="masonry-item memory-card group cursor-pointer"><div class="rounded-2xl overflow-hidden relative glass"><img src="${image}" class="w-full object-cover" alt="${title}"><div class="absolute inset-0 bg-gradient-to-t from-black/75 via-black/10 to-transparent opacity-100 flex flex-col justify-end p-4"><p class="text-white font-bold text-lg">${title}</p>${desc ? `<p class="text-white/85 text-sm mt-1">${desc}</p>` : ''}<div class="mt-3 flex items-center justify-between gap-2"><span class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/15 text-white text-xs font-semibold"><i class="far fa-calendar-alt"></i> ${new Date(p.createdAt).toLocaleDateString()}</span>${currentUser && currentUser.isAdmin ? `<button class="danger-btn" onclick="event.stopPropagation(); deleteMemory('${p.id}')"><i class="fas fa-trash mr-1"></i> Delete</button>` : ''}</div></div></div></div>`;
            }).join('');
        }

        function renderEvents() {
            const container = document.getElementById('view-events');
            if (allMemories.length === 0) {
                container.innerHTML = `<div class="max-w-4xl mx-auto px-4 py-20 text-center text-[var(--text-muted)]">No events yet. Create memories to see timeline.</div>`;
                return;
            }
            container.innerHTML = `
                <div class="max-w-4xl mx-auto px-4 sm:px-6 py-10 pb-20">
                    <div class="mb-12"><h1 class="text-3xl md:text-4xl lg:text-5xl font-bold"><span class="text-[var(--text-main)]">Special</span> <span class="gradient-text">Events</span></h1><p class="text-[var(--text-muted)] mt-2">Timeline of our Novus milestones</p></div>
                    <div class="relative timeline-container" id="eventGrid"></div>
                </div>
            `;
            const grid = document.getElementById('eventGrid');
            grid.innerHTML = allMemories.map(p => `
                <div class="relative mb-8 group"><div class="timeline-dot"></div><div class="glass rounded-2xl border border-[var(--border-line)] overflow-hidden w-full md:w-[85%] ml-auto hover:-translate-y-2 transition"><div class="p-5"><div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-[var(--primary)]/10 text-[var(--primary)] text-xs font-bold uppercase mb-3">${new Date(p.createdAt).toLocaleDateString()}</div><h3 class="font-bold text-xl mb-2">${escapeHtml(p.content?.split('\n')[0] || 'Memory')}</h3><p class="text-[var(--text-muted)]">${escapeHtml(p.content?.split('\n').slice(1).join(' ') || '')}</p>${currentUser && currentUser.isAdmin ? `<button class="danger-btn mt-4" onclick="deleteMemory('${p.id}')"><i class="fas fa-trash mr-1"></i> Delete</button>` : ''}</div></div></div>
            `).join('');
        }

        function renderStories() {
            const container = document.getElementById('view-quotes');
            container.innerHTML = `
                <div class="max-w-7xl mx-auto px-4 sm:px-6 py-10 pb-20">
                    <div class="text-center mb-12"><h1 class="text-3xl md:text-4xl lg:text-5xl font-bold"><span class="text-[var(--text-main)]">Student</span> <span class="gradient-text">Stories</span></h1><p class="text-[var(--text-muted)] max-w-2xl mx-auto">Dreams, quotes, and inspirations from the Class of 2026/27</p></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6" id="storiesGrid"></div>
                </div>
            `;
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = allStudents.map(s => `
                <div class="glass rounded-2xl p-6 cursor-pointer interactive-card" onclick="openStudentModal('${s.id}')"><i class="fas fa-quote-left text-3xl text-[var(--primary)]/30 mb-3"></i><p class="text-lg font-medium mb-4">"${escapeHtml(s.quote || 'No quote yet')}"</p><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full bg-gradient-to-br from-[var(--primary)] to-[var(--secondary)] flex items-center justify-center text-white text-sm font-bold">${escapeHtml(s.name.split(' ').map(n => n[0]).join(''))}</div><div><p class="font-bold">${escapeHtml(s.name)}</p><p class="text-xs text-[var(--text-muted)]">✨ ${escapeHtml(s.aspiration || 'Dream big')}</p></div></div></div>
            `).join('');
        }

        function renderAdminPanel() {
            if (!currentUser || !currentUser.isAdmin) {
                document.getElementById('view-admin').innerHTML = `<div class="max-w-7xl mx-auto px-4 py-20 text-center text-[var(--text-muted)]">Access denied. Admin only.</div>`;
                return;
            }
            const studentListHtml = allStudents.map(s => `<div class="flex justify-between items-center p-3 border-b border-[var(--border-line)]"><span>${escapeHtml(s.name)} (${escapeHtml(s.email)})</span><div><button onclick="editStudent('${s.id}')" class="text-blue-400 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteStudent('${s.id}')" class="text-red-400"><i class="fas fa-trash"></i></button></div></div>`).join('');
            document.getElementById('view-admin').innerHTML = `
                <div class="max-w-7xl mx-auto px-4 sm:px-6 py-10 pb-20">
                    <div class="mb-8"><h1 class="text-3xl md:text-4xl lg:text-5xl font-bold"><span class="text-[var(--text-main)]">Admin</span> <span class="gradient-text">Panel</span></h1><p class="text-[var(--text-muted)] mt-2">Manage students and memories</p></div>
                    <div class="glass rounded-2xl p-6 mb-8"><h3 class="text-xl font-bold mb-4">Add New Student</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><input type="text" id="newName" placeholder="Full Name" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"><input type="email" id="newEmail" placeholder="Email" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"><textarea id="newQuote" placeholder="Quote / Motto" rows="2" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"></textarea><input type="text" id="newDream" placeholder="Dream / Aspiration" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"><input type="text" id="newHobby" placeholder="Hobby / Passion" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"><input type="text" id="newAspiration" placeholder="Aspiration (Life Goal)" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"><input type="text" id="newFunFact" placeholder="Fun Fact" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"><div class="col-span-2"><label class="block text-sm text-[var(--text-muted)] mb-1">Profile Photo</label><input type="file" id="newPhoto" accept="image/*" class="hidden"><div class="flex items-center gap-2"><button onclick="document.getElementById('newPhoto').click()" class="file-upload-btn"><i class="fas fa-upload mr-1"></i> Choose Photo</button><span id="file-name" class="file-name">No file chosen</span></div></div></div><button onclick="addStudentFromForm()" class="mt-4 px-6 py-2 bg-[var(--primary)] text-white rounded-xl">Add Student</button></div>
                    <div class="glass rounded-2xl p-6 mb-8"><h3 class="text-xl font-bold mb-4">Create Memory Post</h3><div class="grid grid-cols-1 gap-4"><input type="text" id="postTitle" placeholder="Title" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"><textarea id="postContent" placeholder="Description" rows="3" class="bg-[var(--surface)] border border-[var(--border-line)] rounded-lg px-4 py-2"></textarea><div><input type="file" id="postImage" accept="image/*" class="hidden"><button onclick="document.getElementById('postImage').click()" class="file-upload-btn"><i class="fas fa-image mr-1"></i> Add Image</button><span id="post-file-name" class="file-name ml-2">No file chosen</span></div><button onclick="createPostFromForm()" class="mt-2 px-6 py-2 bg-[var(--primary)] text-white rounded-xl">Create Memory</button></div></div>
                    <div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">Manage Students</h3><div id="adminStudentList" class="space-y-2 max-h-96 overflow-y-auto">${studentListHtml}</div></div>
                </div>
            `;
            const newPhoto = document.getElementById('newPhoto');
            const postImage = document.getElementById('postImage');
            if (newPhoto) newPhoto.onchange = (e) => { document.getElementById('file-name').innerText = e.target.files[0] ? e.target.files[0].name : 'No file chosen'; };
            if (postImage) postImage.onchange = (e) => { document.getElementById('post-file-name').innerText = e.target.files[0] ? e.target.files[0].name : 'No file chosen'; };
        }

        function renderAllViews() {
            renderHome();
            renderStudents();
            renderMemories();
            renderEvents();
            renderStories();
            renderAdminPanel();
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', async () => {
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
                document.getElementById('themeIcon').className = 'fas fa-moon text-lg';
            }
            if (isSidebarCollapsed) toggleSidebar();

            token = localStorage.getItem('token');
            if (token) {
                try {
                    await loadAllData();
                    closeLogin();
                    showView('home');
                } catch (err) {
                    console.error(err);
                    localStorage.removeItem('token');
                    token = null;
                    openLogin();
                }
            } else {
                openLogin();
            }
        });

        window.deleteMemory = deleteMemory;
        window.editStudent = editStudent;
        window.deleteStudent = deleteStudent;
        window.showView = showView;
        window.closeStudentModal = closeStudentModal;
        window.addStudentFromForm = addStudentFromForm;
        window.createPostFromForm = createPostFromForm;
    </script>
</body>
</html>
